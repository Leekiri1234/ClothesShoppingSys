<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/layout}">
<head>
    <title th:text="${pageTitle}">Products</title>
    <meta name="description" content="Browse our collection of quality products">
</head>
<body>
    <div layout:fragment="content">
        <div class="row">
            <div class="col-md-12">
                <h1 class="mb-4" th:text="${pageTitle}">Shop All Products</h1>
            </div>
        </div>

        <div class="row">
            <div th:if="${products.content.isEmpty()}" class="col-12 text-center py-5">
                <i class="fas fa-box-open fa-5x text-muted mb-3"></i>
                <h3 class="text-muted">No products available</h3>
            </div>

            <div th:each="product : ${products.content}" class="col-md-3 mb-4">
                <div class="card h-100">
                    <a th:href="@{/products/{slug}(slug=${product.productSlug})}" class="text-decoration-none">
                        <img th:if="${product.imageUrl}"
                             th:src="${product.imageUrl}"
                             class="card-img-top"
                             alt="Product"
                             style="height: 250px; object-fit: cover;">
                        <div th:unless="${product.imageUrl}"
                             class="bg-light d-flex align-items-center justify-content-center"
                             style="height: 250px;">
                            <i class="fas fa-image fa-3x text-muted"></i>
                        </div>
                    </a>
                    <div class="card-body">
                        <h5 class="card-title">
                            <a th:href="@{/products/{slug}(slug=${product.productSlug})}"
                               class="text-decoration-none text-dark"
                               th:text="${product.productName}">Product Name</a>
                        </h5>
                        <p class="text-muted small mb-2" th:text="${product.categoryName}">Category</p>
                        <p class="card-text text-primary fw-bold mb-2">
                            <span th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + ' đ'">100,000đ</span>
                        </p>
                        <div th:if="${product.available}" class="d-grid">
                            <button class="btn btn-primary btn-sm">
                                <i class="fas fa-cart-plus"></i> Add to Cart
                            </button>
                        </div>
                        <div th:unless="${product.available}">
                            <span class="badge bg-danger">Out of Stock</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Pagination -->
        <nav th:if="${products.totalPages > 1}" class="mt-4">
            <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${products.first} ? 'disabled'">
                    <a class="page-link" th:href="@{/products(page=${currentPage - 1})}">Previous</a>
                </li>

                <li class="page-item"
                    th:each="pageNum : ${#numbers.sequence(0, products.totalPages - 1)}"
                    th:classappend="${pageNum == currentPage} ? 'active'">
                    <a class="page-link" th:href="@{/products(page=${pageNum})}" th:text="${pageNum + 1}">1</a>
                </li>

                <li class="page-item" th:classappend="${products.last} ? 'disabled'">
                    <a class="page-link" th:href="@{/products(page=${currentPage + 1})}">Next</a>
                </li>
            </ul>
        </nav>
    </div>
</body>
</html>
