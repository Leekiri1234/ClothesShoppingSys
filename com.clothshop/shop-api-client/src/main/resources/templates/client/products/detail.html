<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/layout}">
<head>
    <title th:text="${pageTitle}">Product Detail</title>
    <meta name="description" th:content="${pageDescription}">
</head>
<body>
    <div layout:fragment="content">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a th:href="@{/}">Home</a></li>
                <li class="breadcrumb-item"><a th:href="@{/products}">Products</a></li>
                <li class="breadcrumb-item active" th:text="${product.productName}">Product</li>
            </ol>
        </nav>

        <div class="row">
            <div class="col-md-6">
                <img th:if="${product.imageUrl}"
                     th:src="${product.imageUrl}"
                     class="img-fluid rounded"
                     th:alt="${product.productName}">
                <div th:unless="${product.imageUrl}"
                     class="bg-light d-flex align-items-center justify-content-center rounded"
                     style="height: 500px;">
                    <i class="fas fa-image fa-5x text-muted"></i>
                </div>
            </div>

            <div class="col-md-6">
                <h1 th:text="${product.productName}">Product Name</h1>
                <p class="text-muted" th:text="${product.categoryName}">Category</p>

                <h2 class="text-primary mb-3">
                    <span th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + ' VND'">100,000 VND</span>
                </h2>

                <div class="mb-3">
                    <span th:if="${product.available}" class="badge bg-success">
                        <i class="fas fa-check"></i> In Stock
                    </span>
                    <span th:unless="${product.available}" class="badge bg-danger">
                        <i class="fas fa-times"></i> Out of Stock
                    </span>
                </div>

                <div class="mb-4">
                    <h5>Description:</h5>
                    <p th:text="${product.description}">Product description goes here...</p>
                </div>

                <div th:if="${product.available}" class="d-grid gap-2">
                    <button class="btn btn-primary btn-lg">
                        <i class="fas fa-cart-plus"></i> Add to Cart
                    </button>
                    <button class="btn btn-outline-secondary">
                        <i class="fas fa-heart"></i> Add to Wishlist
                    </button>
                </div>

                <div th:unless="${product.available}" class="alert alert-warning">
                    <i class="fas fa-exclamation-triangle"></i> This product is currently out of stock
                </div>
            </div>
        </div>

        <div class="row mt-5">
            <div class="col-12">
                <h3>Related Products</h3>
                <p class="text-muted">Coming soon...</p>
            </div>
        </div>
    </div>
</body>
</html>
