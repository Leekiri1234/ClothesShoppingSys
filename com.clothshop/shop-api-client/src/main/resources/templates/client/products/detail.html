<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/layout}">
<head>
    <title th:text="${product.productName} + ' - ClothShop'">Product Detail</title>
</head>
<body>
<div layout:fragment="content" class="container py-5">
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">Home</a></li>
            <li class="breadcrumb-item"><a th:href="@{/products}">Products</a></li>
            <li class="breadcrumb-item active" aria-current="page" th:text="${product.productName}">Product</li>
        </ol>
    </nav>

    <div class="row">
        <div class="col-md-6 mb-4">
            <div id="productCarousel" class="carousel slide" data-bs-ride="carousel">
                <div class="carousel-inner rounded shadow-sm">
                    <div class="carousel-item active">
                        <img th:src="${product.imageUrl}" class="d-block w-100" style="height: 500px; object-fit: cover;">
                    </div>
                    <div th:each="imgUrl : ${product.images}" class="carousel-item">
                        <img th:src="${imgUrl}" class="d-block w-100" style="height: 500px; object-fit: cover;">
                    </div>
                </div>
                <button class="carousel-control-prev" type="button" data-bs-target="#productCarousel" data-bs-slide="prev">
                    <span class="carousel-control-prev-icon"></span>
                </button>
                <button class="carousel-control-next" type="button" data-bs-target="#productCarousel" data-bs-slide="next">
                    <span class="carousel-control-next-icon"></span>
                </button>
            </div>
        </div>

        <div class="col-md-6">
            <span class="badge bg-secondary mb-2" th:text="${product.categoryName}">Category</span>
            <h1 class="fw-bold" th:text="${product.productName}">Name</h1>

            <h3 class="text-danger fw-bold my-3" id="displayPrice"
                th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + ' VND'">
            </h3>

            <hr>
            <p class="text-muted" th:text="${product.description}"></p>

            <form id="addToCartForm">
                <div class="mb-3">
                    <label class="form-label fw-bold">Select Color:</label>
                    <select class="form-select" id="colorSelector" onchange="handleColorChange()">
                        <option value="">-- Choose Color --</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Select Size:</label>
                    <select class="form-select" id="sizeSelector" onchange="handleSizeChange()" disabled>
                        <option value="">-- Choose Size --</option>
                    </select>
                </div>

                <div class="mb-4">
                    <span id="stockStatus" class="badge bg-light text-dark fs-6">Please select color and size</span>
                </div>

                <div class="mb-4 d-flex align-items-center">
                    <label class="form-label fw-bold me-3 mb-0">Quantity:</label>
                    <input type="number" id="quantity" class="form-control text-center" value="1" min="1" style="width: 80px;" disabled>
                </div>

                <div class="d-grid gap-2 d-md-flex">
                    <button type="button" id="btnAddToCart" class="btn btn-dark btn-lg px-4" disabled>
                        <i class="fas fa-shopping-cart me-2"></i> Add to Cart
                    </button>
                </div>

                <input type="hidden" id="selectedVariantId" name="variantId">
            </form>
        </div>
    </div>
</div>

<th:block layout:fragment="scripts">
    <script th:inline="javascript">
        // Debug: Xem dữ liệu từ Server có về tới đây không
        /*<![CDATA[*/
        const productVariants = [[${product.variants}]] || [];
        const basePrice = [[${product.price}]] || 0;
        /*]]>*/

        console.log("Raw Product Variants from Server:", productVariants);

        document.addEventListener('DOMContentLoaded', function() {
            if (productVariants.length === 0) {
                console.error("No variants found for this product!");
                return;
            }
            populateColors();
        });

        function populateColors() {
            const colorSelector = document.getElementById('colorSelector');
            // Lấy danh sách màu không trùng, loại bỏ giá trị null
            const colors = [...new Set(productVariants.map(v => v.color))].filter(c => c !== null && c !== "");

            console.log("Unique Colors detected:", colors);

            colors.forEach(color => {
                const opt = new Option(color, color);
                colorSelector.add(opt);
            });
        }

        function handleColorChange() {
            const selectedColor = document.getElementById('colorSelector').value;
            const sizeSelector = document.getElementById('sizeSelector');

            // Reset state
            sizeSelector.innerHTML = '<option value="">-- Choose Size --</option>';
            sizeSelector.disabled = !selectedColor;
            resetStatus();

            if (selectedColor) {
                // Lọc các size thuộc màu đã chọn
                const availableSizes = productVariants
                    .filter(v => v.color === selectedColor)
                    .map(v => v.sizeValue);

                [...new Set(availableSizes)].forEach(size => {
                    const opt = new Option(size, size);
                    sizeSelector.add(opt);
                });
            }
        }

        function handleSizeChange() {
            const selectedColor = document.getElementById('colorSelector').value;
            const selectedSize = document.getElementById('sizeSelector').value;

            if (!selectedColor || !selectedSize) {
                resetStatus();
                return;
            }

            const variant = productVariants.find(v => v.color === selectedColor && v.sizeValue === selectedSize);

            if (variant) {
                console.log("Selected Variant:", variant);
                updateUI(variant);
            }
        }

        function updateUI(variant) {
            const displayPrice = document.getElementById('displayPrice');
            const stockStatus = document.getElementById('stockStatus');
            const btn = document.getElementById('btnAddToCart');
            const qty = document.getElementById('quantity');
            const hiddenId = document.getElementById('selectedVariantId');

            // 1. Cập nhật giá (Variant price ưu tiên hơn base price)
            const price = variant.retailPrice || basePrice;
            displayPrice.innerText = new Intl.NumberFormat('vi-VN').format(price) + ' VND';

            // 2. Cập nhật ID
            hiddenId.value = variant.id;
            btn.setAttribute('data-variant-id', variant.id); // Dành cho main.js của em

            // 3. Cập nhật kho
            if (variant.stockQuantity > 0) {
                stockStatus.className = 'badge bg-success fs-6';
                stockStatus.innerText = 'In Stock: ' + variant.stockQuantity;
                btn.disabled = false;
                qty.disabled = false;
                qty.max = variant.stockQuantity;
            } else {
                stockStatus.className = 'badge bg-danger fs-6';
                stockStatus.innerText = 'Out of Stock';
                btn.disabled = true;
                qty.disabled = true;
            }
        }

        function resetStatus() {
            document.getElementById('stockStatus').className = 'badge bg-light text-dark fs-6';
            document.getElementById('stockStatus').innerText = 'Please select color and size';
            document.getElementById('btnAddToCart').disabled = true;
            document.getElementById('quantity').disabled = true;
            document.getElementById('selectedVariantId').value = '';
        }
    </script>
</th:block>
</body>
</html>
