<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/client}">
<head>
    <title th:text="${pageTitle}">Category Products</title>
    <meta name="description" th:content="'Browse products in ' + ${categorySlug} + ' category'">
</head>
<body>
    <div layout:fragment="content">
        <!-- Breadcrumb -->
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a th:href="@{/}">Home</a></li>
                <li class="breadcrumb-item"><a th:href="@{/products}">Products</a></li>
                <li class="breadcrumb-item active" aria-current="page" th:text="${categorySlug}">Category</li>
            </ol>
        </nav>

        <!-- Category Header -->
        <div class="category-header mb-4">
            <h1 class="h2" th:text="${pageTitle}">Category: Fashion</h1>
            <p class="text-muted" th:text="${products.totalElements} + ' products found'">0 products found</p>
        </div>

        <!-- Product Grid -->
        <div class="row g-4" th:if="${products != null and !products.content.isEmpty()}">
            <div class="col-md-3" th:each="product : ${products.content}">
                <div class="card h-100 shadow-sm">
                    <img th:src="${product.imageUrl}"
                         th:alt="${product.productName}"
                         class="card-img-top"
                         style="height: 250px; object-fit: cover;">
                    <div class="card-body">
                        <h5 class="card-title" th:text="${product.productName}">Product Name</h5>
                        <p class="card-text text-muted" th:text="${product.categoryName}">Category</p>
                        <p class="fw-bold text-danger" th:text="${'$' + product.price}">$0.00</p>
                        <a th:href="@{/products/{slug}(slug=${product.productSlug})}"
                           class="btn btn-outline-dark w-100">View Details</a>
                    </div>
                </div>
            </div>
        </div>

        <!-- No Products Message -->
        <div th:unless="${products != null and !products.content.isEmpty()}"
             class="text-center py-5">
            <i class="fas fa-box-open fa-3x text-muted mb-3"></i>
            <p class="text-muted">No products found in this category.</p>
            <a th:href="@{/products}" class="btn btn-primary">Browse All Products</a>
        </div>

        <!-- Pagination -->
        <nav aria-label="Product pagination" th:if="${products != null and products.totalPages > 1}">
            <ul class="pagination justify-content-center mt-4">
                <li class="page-item" th:classappend="${products.first} ? 'disabled'">
                    <a class="page-link"
                       th:href="@{/products/category/{slug}(slug=${categorySlug}, page=${currentPage - 1})}">
                        Previous
                    </a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(0, products.totalPages - 1)}"
                    th:classappend="${i == currentPage} ? 'active'">
                    <a class="page-link"
                       th:href="@{/products/category/{slug}(slug=${categorySlug}, page=${i})}"
                       th:text="${i + 1}">1</a>
                </li>
                <li class="page-item" th:classappend="${products.last} ? 'disabled'">
                    <a class="page-link"
                       th:href="@{/products/category/{slug}(slug=${categorySlug}, page=${currentPage + 1})}">
                        Next
                    </a>
                </li>
            </ul>
        </nav>
    </div>
</body>
</html>
