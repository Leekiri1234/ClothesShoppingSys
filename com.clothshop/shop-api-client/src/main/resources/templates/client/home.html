<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/layout}">
<head>
    <title>Home - Fashion E-commerce</title>
    <meta name="description" content="Discover the latest fashion trends and collections">
</head>
<body>
    <div layout:fragment="content">
        <!-- Hero Section -->
        <section class="hero-section bg-light py-5 mb-4">
            <div class="container text-center">
                <h1 class="display-4 fw-bold mb-3">Welcome to ClothShop</h1>
                <p class="lead mb-4">Discover the Latest Fashion Trends</p>
                <a th:href="@{/products}" class="btn btn-dark btn-lg">Shop Now</a>
            </div>
        </section>

        <!-- Featured Products Section -->
        <section class="featured-products">
            <div class="container">
                <h2 class="text-center mb-4">Featured Products</h2>
                <div class="row g-4" th:if="${featuredProducts != null and !featuredProducts.isEmpty()}">
                    <div class="col-md-3" th:each="product : ${featuredProducts}">
                        <div class="card h-100 shadow-sm">
                            <img th:src="${product.imageUrl}"
                                 th:alt="${product.productName}"
                                 class="card-img-top"
                                 style="height: 250px; object-fit: cover;">
                            <div class="card-body">
                                <h5 class="card-title" th:text="${product.productName}">Product Name</h5>
                                <p class="card-text text-muted" th:text="${product.categoryName}">Category</p>
                                <p class="fw-bold text-danger" th:text="${'$' + product.price}">$0.00</p>
                                <a th:href="@{/products/{slug}(slug=${product.productSlug})}"
                                   class="btn btn-outline-dark w-100">View Details</a>
                            </div>
                        </div>
                    </div>
                </div>
                <div th:unless="${featuredProducts != null and !featuredProducts.isEmpty()}"
                     class="text-center text-muted py-5">
                    <p>No featured products available at the moment.</p>
                </div>
            </div>
        </section>

        <!-- Collections Section -->
        <section class="collections-section mt-5 py-5 bg-light">
            <div class="container">
                <h2 class="text-center mb-4">Shop by Collection</h2>
                <div class="row g-3">
                    <div class="col-md-4 text-center">
                        <div class="card border-0 shadow-sm">
                            <div class="card-body py-4">
                                <i class="fas fa-tshirt fa-3x text-primary mb-3"></i>
                                <h5>Summer Collection</h5>
                                <a th:href="@{/products?collection=summer}" class="btn btn-sm btn-outline-primary mt-2">Browse</a>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4 text-center">
                        <div class="card border-0 shadow-sm">
                            <div class="card-body py-4">
                                <i class="fas fa-snowflake fa-3x text-info mb-3"></i>
                                <h5>Winter Collection</h5>
                                <a th:href="@{/products?collection=winter}" class="btn btn-sm btn-outline-info mt-2">Browse</a>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4 text-center">
                        <div class="card border-0 shadow-sm">
                            <div class="card-body py-4">
                                <i class="fas fa-star fa-3x text-warning mb-3"></i>
                                <h5>Premium Collection</h5>
                                <a th:href="@{/products?collection=premium}" class="btn btn-sm btn-outline-warning mt-2">Browse</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>
</body>
</html>
