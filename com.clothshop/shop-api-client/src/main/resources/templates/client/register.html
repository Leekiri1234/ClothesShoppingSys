<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/layout}">
<head>
    <title>Register - ClothShop</title>
    <style>
        .password-strength {
            height: 5px;
            margin-top: 5px;
            border-radius: 3px;
        }
        .password-strength.weak { background-color: #dc3545; }
        .password-strength.medium { background-color: #ffc107; }
        .password-strength.strong { background-color: #28a745; }
    </style>
</head>
<body>
    <div layout:fragment="content">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-body p-5">
                        <h2 class="text-center mb-4">
                            <i class="fas fa-user-plus"></i> Create Account
                        </h2>

                        <!-- Error Message -->
                        <div th:if="${error}" class="alert alert-danger" role="alert">
                            <i class="fas fa-exclamation-triangle"></i> <span th:text="${error}"></span>
                        </div>

                        <!-- Registration Form -->
                        <form th:action="@{/register}"
                              th:object="${registerRequest}"
                              method="post"
                              id="registrationForm">

                            <div class="row">
                                <!-- Username -->
                                <div class="col-md-12 mb-3">
                                    <label for="username" class="form-label">
                                        Username <span class="text-danger">*</span>
                                    </label>
                                    <input type="text"
                                           class="form-control"
                                           id="username"
                                           th:field="*{username}"
                                           th:classappend="${#fields.hasErrors('username')} ? 'is-invalid' : ''"
                                           placeholder="Choose a unique username"
                                           required>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('username')}"
                                         th:errors="*{username}"></div>
                                    <small class="form-text text-muted">
                                        Letters, numbers, and underscores only (3-50 characters)
                                    </small>
                                </div>

                                <!-- First Name -->
                                <div class="col-md-6 mb-3">
                                    <label for="firstName" class="form-label">
                                        First Name <span class="text-danger">*</span>
                                    </label>
                                    <input type="text"
                                           class="form-control"
                                           id="firstName"
                                           th:field="*{firstName}"
                                           th:classappend="${#fields.hasErrors('firstName')} ? 'is-invalid' : ''"
                                           placeholder="Enter your first name"
                                           required>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('firstName')}"
                                         th:errors="*{firstName}"></div>
                                </div>

                                <!-- Last Name -->
                                <div class="col-md-6 mb-3">
                                    <label for="lastName" class="form-label">
                                        Last Name <span class="text-danger">*</span>
                                    </label>
                                    <input type="text"
                                           class="form-control"
                                           id="lastName"
                                           th:field="*{lastName}"
                                           th:classappend="${#fields.hasErrors('lastName')} ? 'is-invalid' : ''"
                                           placeholder="Enter your last name"
                                           required>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('lastName')}"
                                         th:errors="*{lastName}"></div>
                                </div>

                                <!-- Email -->
                                <div class="col-md-12 mb-3">
                                    <label for="email" class="form-label">
                                        Email Address <span class="text-danger">*</span>
                                    </label>
                                    <input type="email"
                                           class="form-control"
                                           id="email"
                                           th:field="*{email}"
                                           th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''"
                                           placeholder="your.email@example.com"
                                           required>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}"
                                         th:errors="*{email}"></div>
                                    <small class="form-text text-muted">
                                        We'll never share your email with anyone else.
                                    </small>
                                </div>

                                <!-- Phone Number -->
                                <div class="col-md-12 mb-3">
                                    <label for="phoneNumber" class="form-label">
                                        Phone Number <span class="text-muted">(Optional)</span>
                                    </label>
                                    <input type="tel"
                                           class="form-control"
                                           id="phoneNumber"
                                           th:field="*{phoneNumber}"
                                           th:classappend="${#fields.hasErrors('phoneNumber')} ? 'is-invalid' : ''"
                                           placeholder="+84901234567">
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('phoneNumber')}"
                                         th:errors="*{phoneNumber}"></div>
                                </div>

                                <!-- Password -->
                                <div class="col-md-6 mb-3">
                                    <label for="password" class="form-label">
                                        Password <span class="text-danger">*</span>
                                    </label>
                                    <input type="password"
                                           class="form-control"
                                           id="password"
                                           th:field="*{password}"
                                           th:classappend="${#fields.hasErrors('password')} ? 'is-invalid' : ''"
                                           placeholder="Minimum 8 characters"
                                           required>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}"
                                         th:errors="*{password}"></div>
                                    <div class="password-strength" id="passwordStrength"></div>
                                </div>

                                <!-- Confirm Password -->
                                <div class="col-md-6 mb-3">
                                    <label for="confirmPassword" class="form-label">
                                        Confirm Password <span class="text-danger">*</span>
                                    </label>
                                    <input type="password"
                                           class="form-control"
                                           id="confirmPassword"
                                           th:field="*{confirmPassword}"
                                           th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid' : ''"
                                           placeholder="Re-enter your password"
                                           required>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('confirmPassword')}"
                                         th:errors="*{confirmPassword}"></div>
                                    <small class="form-text text-danger" id="passwordMismatch" style="display: none;">
                                        Passwords do not match
                                    </small>
                                </div>
                            </div>

                            <!-- Terms and Conditions -->
                            <div class="form-check mb-3">
                                <input class="form-check-input" type="checkbox" id="acceptTerms" required>
                                <label class="form-check-label" for="acceptTerms">
                                    I agree to the <a href="#" th:href="@{/terms}">Terms and Conditions</a>
                                </label>
                            </div>

                            <!-- Submit Button -->
                            <div class="d-grid gap-2 mb-3">
                                <button type="submit" class="btn btn-primary btn-lg">
                                    <i class="fas fa-user-plus"></i> Create Account
                                </button>
                            </div>

                            <!-- CSRF Token (Required for Spring Security) -->
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        </form>

                        <!-- Login Link -->
                        <div class="text-center mt-3">
                            <p>Already have an account?
                                <a href="#" th:href="@{/login}">Login here</a>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- JavaScript for client-side validation -->
    <div layout:fragment="scripts">
        <script th:inline="javascript">
            document.addEventListener('DOMContentLoaded', function() {
                const form = document.getElementById('registrationForm');
                const password = document.getElementById('password');
                const confirmPassword = document.getElementById('confirmPassword');
                const passwordStrength = document.getElementById('passwordStrength');
                const passwordMismatch = document.getElementById('passwordMismatch');

                // Password strength indicator
                password.addEventListener('input', function() {
                    const val = this.value;
                    let strength = '';

                    if (val.length < 8) {
                        strength = 'weak';
                    } else if (val.length < 12) {
                        strength = 'medium';
                    } else {
                        strength = 'strong';
                    }

                    passwordStrength.className = 'password-strength ' + strength;
                });

                // Password match validation
                function checkPasswordMatch() {
                    if (confirmPassword.value !== '' && password.value !== confirmPassword.value) {
                        passwordMismatch.style.display = 'block';
                        confirmPassword.classList.add('is-invalid');
                        return false;
                    } else {
                        passwordMismatch.style.display = 'none';
                        confirmPassword.classList.remove('is-invalid');
                        return true;
                    }
                }

                confirmPassword.addEventListener('input', checkPasswordMatch);
                password.addEventListener('input', function() {
                    if (confirmPassword.value !== '') {
                        checkPasswordMatch();
                    }
                });

                // Form submission validation
                form.addEventListener('submit', function(e) {
                    if (!checkPasswordMatch()) {
                        e.preventDefault();
                        return false;
                    }
                });
            });
        </script>
    </div>
</body>
</html>
