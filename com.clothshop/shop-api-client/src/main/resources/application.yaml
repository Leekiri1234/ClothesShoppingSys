server:
  port: 8080 #Cổng mặc định cho client

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/clothshop_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true
    username: root #Cập nhật tên người dùng của bạn nếu khác
    password: 123 #Cập nhật mật khẩu của bạn nếu khác

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
        globally_quoted_identifiers: true
        jdbc:
          time_zone: Asia/Ho_Chi_Minh


  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    cache: false

logging:
  level:
    com.clothshop: DEBUG
    org.hibernate.SQL: DEBUG
