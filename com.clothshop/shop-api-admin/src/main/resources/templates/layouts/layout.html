<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title layout:title-pattern="$CONTENT_TITLE - ClothShop Admin">ClothShop Admin</title>

    <link rel="icon" type="image/x-icon" th:href="@{/favicon.ico}" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">

    <style>
        .sidebar { background-color: #2c3e50; min-height: 100vh; }
        .sidebar .nav-link { color: #bdc3c7; transition: all 0.3s; padding: 10px 20px; }
        .sidebar .nav-link:hover { color: #fff; background: rgba(255,255,255,0.1); }
        .sidebar .nav-link.active { color: #fff; background-color: #3498db; border-radius: 5px; }
        .sidebar-header { border-bottom: 1px solid rgba(255,255,255,0.1); }
        .user-badge { font-size: 0.7rem; letter-spacing: 0.5px; text-transform: uppercase; }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <nav class="col-md-3 col-lg-2 d-md-block sidebar collapse">
            <div class="position-sticky pt-3">

                <div class="sidebar-header text-center text-white mb-4 p-3">
                    <div class="mb-2">
                        <i class="fas fa-user-circle fa-3x text-light"></i>
                    </div>
                    <h6 class="mb-1 fw-bold" sec:authentication="name">Username</h6>
                    <div class="d-flex flex-wrap justify-content-center gap-1">
                            <span th:each="auth : ${#authentication.getAuthorities()}"
                                  th:if="${auth.authority != 'ROLE_STAFF'}"
                                  class="badge bg-info text-dark user-badge"
                                  th:text="${#strings.replace(auth.authority, 'ROLE_', '')}">
                            </span>
                    </div>
                </div>
                <ul class="nav flex-column px-2">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/admin/dashboard}"
                           th:classappend="${currentPath != null and #strings.contains(currentPath, '/dashboard')} ? 'active' : ''">
                            <i class="fas fa-home me-2"></i> Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/admin/products}"
                           th:classappend="${currentPath != null and #strings.contains(currentPath, '/products')} ? 'active' : ''">
                            <i class="fas fa-box me-2"></i> Products
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/admin/categories}"
                           th:classappend="${currentPath != null and #strings.contains(currentPath, '/categories')} ? 'active' : ''">
                            <i class="fas fa-tags me-2"></i> Categories
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/admin/orders}"
                           th:classappend="${currentPath != null and #strings.contains(currentPath, '/orders')} ? 'active' : ''">
                            <i class="fas fa-shopping-cart me-2"></i> Orders
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/admin/customers}"
                           th:classappend="${currentPath != null and #strings.contains(currentPath, '/customers')} ? 'active' : ''">
                            <i class="fas fa-users me-2"></i> Customers
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/admin/vouchers}"
                           th:classappend="${currentPath != null and #strings.contains(currentPath, '/vouchers')} ? 'active' : ''">
                            <i class="fas fa-ticket-alt me-2"></i> Vouchers
                        </a>
                    </li>
                    <li class="nav-item" sec:authorize="hasAnyRole('SUPER_ADMIN', 'MARKETING_STAFF')">
                        <a class="nav-link" th:href="@{/admin/collections}"
                           th:classappend="${currentPath != null and #strings.contains(currentPath, '/collections')} ? 'active' : ''">
                            <i class="fas fa-box-open me-2"></i> Collections
                        </a>
                    </li>

                    <li class="nav-item" sec:authorize="hasRole('SUPER_ADMIN')">
                        <a class="nav-link" th:href="@{/admin/staff}"
                           th:classappend="${currentPath != null and #strings.contains(currentPath, '/staff')} ? 'active' : ''">
                            <i class="fas fa-users-cog me-2"></i> Staff Management
                        </a>
                    </li>

                    <li class="nav-item mt-3 border-top border-secondary pt-3">
                        <form th:action="@{/admin/logout}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button class="nav-link btn btn-link w-100 text-start text-danger border-0" type="submit">
                                <i class="fas fa-sign-out-alt me-2"></i> Logout
                            </button>
                        </form>
                    </li>
                </ul>
            </div>
        </nav>

        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
            <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                <h1 class="h2" layout:fragment="page-title">Page Title</h1>
                <div class="btn-toolbar mb-2 mb-md-0" layout:fragment="page-actions">
                </div>
            </div>

            <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                <i class="fas fa-check-circle me-2"></i>
                <span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <i class="fas fa-exclamation-circle me-2"></i>
                <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div layout:fragment="content">
                <p>Content goes here</p>
            </div>

            <footer class="footer mt-5 py-3 border-top">
                <div class="container-fluid text-center text-md-start">
                    <div class="row">
                        <div class="col-md-6">
                            <p class="text-muted mb-0 small">
                                <i class="far fa-copyright"></i> 2026 ClothShop. All rights reserved.
                            </p>
                        </div>
                    </div>
                </div>
            </footer>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
