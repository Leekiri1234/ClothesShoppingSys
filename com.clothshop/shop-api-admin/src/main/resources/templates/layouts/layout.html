<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title layout:title-pattern="$CONTENT_TITLE - ClothShop Admin">ClothShop Admin</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom Admin CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar Navigation -->
            <nav class="col-md-3 col-lg-2 d-md-block sidebar collapse">
                <div class="position-sticky pt-3">
                    <!-- Header: Logo and User Info -->
                    <div class="text-center text-white mb-4 p-3">
                        <i class="fas fa-store fa-2x mb-2"></i>
                        <h4 class="mb-1">ClothShop Admin</h4>
                        <small class="text-muted" sec:authentication="name">Administrator</small>
                    </div>

                    <!-- Sidebar: Navigation Links -->
                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/admin/dashboard}"
                               th:classappend="${currentPath != null and #strings.contains(currentPath, '/dashboard')} ? 'active' : ''">
                                <i class="fas fa-home"></i> Dashboard
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/admin/products}"
                               th:classappend="${currentPath != null and #strings.contains(currentPath, '/products')} ? 'active' : ''">
                                <i class="fas fa-box"></i> Products
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/admin/categories}"
                               th:classappend="${currentPath != null and #strings.contains(currentPath, '/categories')} ? 'active' : ''">
                                <i class="fas fa-tags"></i> Categories
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/admin/orders}"
                               th:classappend="${currentPath != null and #strings.contains(currentPath, '/orders')} ? 'active' : ''">
                                <i class="fas fa-shopping-cart"></i> Orders
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/admin/customers}"
                               th:classappend="${currentPath != null and #strings.contains(currentPath, '/customers')} ? 'active' : ''">
                                <i class="fas fa-users"></i> Customers
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/admin/vouchers}"
                               th:classappend="${currentPath != null and #strings.contains(currentPath, '/vouchers')} ? 'active' : ''">
                                <i class="fas fa-ticket-alt"></i> Vouchers
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/admin/users}"
                               th:classappend="${currentPath != null and #strings.contains(currentPath, '/users')} ? 'active' : ''">
                                <i class="fas fa-user-shield"></i> Users
                            </a>
                        </li>
                        <li class="nav-item mt-3 border-top pt-3">
                            <form th:action="@{/admin/logout}" method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button class="nav-link btn btn-link w-100 text-start text-danger" type="submit">
                                    <i class="fas fa-sign-out-alt"></i> Logout
                                </button>
                            </form>
                        </li>
                    </ul>
                </div>
            </nav>

            <!-- Main Content Area -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
                <!-- Page Header -->
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2" layout:fragment="page-title">Page Title</h1>
                    <div class="btn-toolbar mb-2 mb-md-0" layout:fragment="page-actions">
                        <!-- Page-specific actions can be inserted here -->
                    </div>
                </div>

                <!-- Flash Messages -->
                <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <i class="fas fa-check-circle"></i>
                    <span th:text="${successMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <i class="fas fa-exclamation-circle"></i>
                    <span th:text="${errorMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <div th:if="${warningMessage}" class="alert alert-warning alert-dismissible fade show" role="alert">
                    <i class="fas fa-exclamation-triangle"></i>
                    <span th:text="${warningMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <div th:if="${infoMessage}" class="alert alert-info alert-dismissible fade show" role="alert">
                    <i class="fas fa-info-circle"></i>
                    <span th:text="${infoMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <!-- Page Content -->
                <div layout:fragment="content">
                    <p>Content goes here</p>
                </div>

                <!-- Footer -->
                <footer class="footer mt-5 py-3 border-top">
                    <div class="container-fluid">
                        <div class="row">
                            <div class="col-md-6">
                                <p class="text-muted mb-0">
                                    <i class="far fa-copyright"></i> 2026 ClothShop. All rights reserved.
                                </p>
                            </div>
                            <div class="col-md-6 text-md-end">
                                <small class="text-muted">
                                    Version 1.0.0 |
                                    <a href="#" class="text-decoration-none">Help</a> |
                                    <a href="#" class="text-decoration-none">Privacy</a>
                                </small>
                            </div>
                        </div>
                    </div>
                </footer>
            </main>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom Admin JS -->
    <script th:src="@{/js/main.js}"></script>
</body>
</html>
