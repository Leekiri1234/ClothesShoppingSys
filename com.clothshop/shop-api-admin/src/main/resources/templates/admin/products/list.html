<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/layout}">
<head>
    <title>Products Management</title>
</head>
<body>
    <div layout:fragment="page-title">
        <h1 class="h2">Products Management</h1>
    </div>

    <div layout:fragment="content">
        <div class="row mb-3">
            <div class="col-md-12">
                <a th:href="@{/admin/products/create}" class="btn btn-primary">
                    <i class="fas fa-plus"></i> Add New Product
                </a>
            </div>
        </div>

        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead class="table-light">
                            <tr>
                                <th>ID</th>
                                <th>Image</th>
                                <th>Name</th>
                                <th>Category</th>
                                <th>Price</th>
                                <th>Stock</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${products.content.isEmpty()}">
                                <td colspan="8" class="text-center text-muted">
                                    <i class="fas fa-inbox fa-3x mb-2"></i>
                                    <p>No products found</p>
                                </td>
                            </tr>
                            <tr th:each="product : ${products.content}">
                                <td th:text="${product.productId}">1</td>
                                <td>
                                    <img th:if="${product.imageUrl}"
                                         th:src="${product.imageUrl}"
                                         alt="Product Image"
                                         style="width: 50px; height: 50px; object-fit: cover;">
                                    <span th:unless="${product.imageUrl}" class="text-muted">
                                        <i class="fas fa-image"></i>
                                    </span>
                                </td>
                                <td>
                                    <strong th:text="${product.productName}">Product Name</strong>
                                    <br>
                                    <small class="text-muted" th:text="${product.productSlug}">slug</small>
                                </td>
                                <td th:text="${product.categoryName}">Category</td>
                                <td th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + ' đ'">100,000đ</td>
                                <td>
                                    <span th:class="${product.stock > 10} ? 'badge bg-success' : (${product.stock > 0} ? 'badge bg-warning' : 'badge bg-danger')"
                                          th:text="${product.stock}">100</span>
                                </td>
                                <td>
                                    <span th:if="${product.isActive}" class="badge bg-success">
                                        <i class="fas fa-check"></i> Active
                                    </span>
                                    <span th:unless="${product.isActive}" class="badge bg-secondary">
                                        <i class="fas fa-times"></i> Inactive
                                    </span>
                                </td>
                                <td>
                                    <div class="btn-group btn-group-sm" role="group">
                                        <a th:href="@{/admin/products/{id}(id=${product.productId})}"
                                           class="btn btn-info" title="View">
                                            <i class="fas fa-eye"></i>
                                        </a>
                                        <a th:href="@{/admin/products/{id}/edit(id=${product.productId})}"
                                           class="btn btn-warning" title="Edit">
                                            <i class="fas fa-edit"></i>
                                        </a>
                                        <button type="button"
                                                class="btn btn-danger"
                                                data-bs-toggle="modal"
                                                th:data-bs-target="'#deleteModal' + ${product.productId}"
                                                title="Delete">
                                            <i class="fas fa-trash"></i>
                                        </button>
                                    </div>

                                    <!-- Delete Confirmation Modal -->
                                    <div class="modal fade" th:id="'deleteModal' + ${product.productId}" tabindex="-1">
                                        <div class="modal-dialog">
                                            <div class="modal-content">
                                                <div class="modal-header">
                                                    <h5 class="modal-title">Confirm Delete</h5>
                                                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                                                </div>
                                                <div class="modal-body">
                                                    Are you sure you want to delete
                                                    <strong th:text="${product.productName}">this product</strong>?
                                                </div>
                                                <div class="modal-footer">
                                                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                                                    <form th:action="@{/admin/products/{id}/delete(id=${product.productId})}" method="post">
                                                        <button type="submit" class="btn btn-danger">Delete</button>
                                                    </form>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Pagination -->
                <nav th:if="${products.totalPages > 1}">
                    <ul class="pagination justify-content-center">
                        <li class="page-item" th:classappend="${products.first} ? 'disabled'">
                            <a class="page-link" th:href="@{/admin/products(page=${currentPage - 1})}">Previous</a>
                        </li>

                        <li class="page-item"
                            th:each="pageNum : ${#numbers.sequence(0, products.totalPages - 1)}"
                            th:classappend="${pageNum == currentPage} ? 'active'">
                            <a class="page-link" th:href="@{/admin/products(page=${pageNum})}" th:text="${pageNum + 1}">1</a>
                        </li>

                        <li class="page-item" th:classappend="${products.last} ? 'disabled'">
                            <a class="page-link" th:href="@{/admin/products(page=${currentPage + 1})}">Next</a>
                        </li>
                    </ul>
                </nav>

                <div class="text-center text-muted">
                    <small>
                        Showing <span th:text="${products.content.size()}">0</span> of
                        <span th:text="${products.totalElements}">0</span> products
                    </small>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
