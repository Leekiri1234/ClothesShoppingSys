<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/layout}">
<head>
    <title>Add Product Variant</title>
</head>
<body>
    <div layout:fragment="page-title">
        <div class="d-flex justify-content-between align-items-center">
            <h1 class="h2">Add Product Variant</h1>
            <a th:href="@{/admin/products/{id}(id=${productId})}" class="btn btn-secondary">
                <i class="fas fa-arrow-left"></i> Back to Product
            </a>
        </div>
    </div>

    <div layout:fragment="content">
        <div class="row">
            <div class="col-md-8 offset-md-2">
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title mb-0">
                            <i class="fas fa-cube"></i> Variant Information
                        </h5>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/admin/variants/create}"
                              th:object="${variant}"
                              method="post">

                            <input type="hidden" th:field="*{productId}" />

                            <!-- Color -->
                            <div class="mb-3">
                                <label for="color" class="form-label">
                                    Color <span class="text-danger">*</span>
                                </label>
                                <input type="text"
                                       class="form-control"
                                       th:field="*{color}"
                                       th:classappend="${#fields.hasErrors('color')} ? 'is-invalid' : ''"
                                       id="color"
                                       placeholder="e.g. Red, Blue, Black">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('color')}"
                                     th:errors="*{color}">
                                </div>
                                <small class="form-text text-muted">
                                    Màu sắc của biến thể sản phẩm
                                </small>
                            </div>

                            <!-- Size -->
                            <div class="mb-3">
                                <label for="sizeValue" class="form-label">
                                    Size <span class="text-danger">*</span>
                                </label>
                                <select class="form-select"
                                        th:field="*{sizeValue}"
                                        th:classappend="${#fields.hasErrors('sizeValue')} ? 'is-invalid' : ''"
                                        id="sizeValue">
                                    <option value="">-- Select Size --</option>
                                    <option value="XS">XS</option>
                                    <option value="S">S</option>
                                    <option value="M">M</option>
                                    <option value="L">L</option>
                                    <option value="XL">XL</option>
                                    <option value="XXL">XXL</option>
                                    <option value="XXXL">XXXL</option>
                                </select>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('sizeValue')}"
                                     th:errors="*{sizeValue}">
                                </div>
                                <small class="form-text text-muted">
                                    Kích cỡ của biến thể sản phẩm
                                </small>
                            </div>

                            <!-- Price -->
                            <div class="mb-3">
                                <label for="price" class="form-label">
                                    Retail Price (VND) <span class="text-danger">*</span>
                                </label>
                                <input type="number"
                                       class="form-control"
                                       th:field="*{price}"
                                       th:classappend="${#fields.hasErrors('price')} ? 'is-invalid' : ''"
                                       id="price"
                                       step="1000"
                                       min="0"
                                       placeholder="e.g. 299000">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('price')}"
                                     th:errors="*{price}">
                                </div>
                                <small class="form-text text-muted">
                                    Giá bán lẻ cho biến thể này
                                </small>
                            </div>

                            <!-- Stock -->
                            <div class="mb-3">
                                <label for="stock" class="form-label">
                                    Initial Stock Quantity <span class="text-danger">*</span>
                                </label>
                                <input type="number"
                                       class="form-control"
                                       th:field="*{stock}"
                                       th:classappend="${#fields.hasErrors('stock')} ? 'is-invalid' : ''"
                                       id="stock"
                                       min="0"
                                       placeholder="e.g. 100">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('stock')}"
                                     th:errors="*{stock}">
                                </div>
                                <small class="form-text text-muted">
                                    Số lượng tồn kho ban đầu
                                </small>
                            </div>

                            <!-- Image URL -->
                            <div class="mb-3">
                                <label for="imageUrl" class="form-label">
                                    Image URL
                                </label>
                                <input type="text"
                                       class="form-control"
                                       th:field="*{imageUrl}"
                                       th:classappend="${#fields.hasErrors('imageUrl')} ? 'is-invalid' : ''"
                                       id="imageUrl"
                                       placeholder="https://example.com/image.jpg">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('imageUrl')}"
                                     th:errors="*{imageUrl}">
                                </div>
                                <small class="form-text text-muted">
                                    URL hình ảnh riêng cho biến thể này (optional)
                                </small>
                            </div>

                            <!-- Action Buttons -->
                            <div class="d-flex justify-content-between mt-4">
                                <a th:href="@{/admin/products/{id}(id=${productId})}"
                                   class="btn btn-secondary">
                                    <i class="fas fa-times"></i> Cancel
                                </a>
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-save"></i> Add Variant
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
